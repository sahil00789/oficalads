<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAI CLUB OFFICIAL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at top, #050a1a 0%, #020408 60%, #000000 100%);
    font-family: 'Rajdhani', sans-serif;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Animated background particles */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,50,50,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 70%, rgba(255,100,0,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 50%, rgba(255,50,50,0.15) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
    background: rgba(10, 5, 20, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    border: 1px solid rgba(255, 60, 30, 0.18);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 8px 60px rgba(0,0,0,0.8),
      0 0 40px rgba(200, 20, 0, 0.08);
    padding: 36px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Glowing top border accent */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ff3300, #ff7700, #ff3300, transparent);
    border-radius: 2px;
  }

  /* --- Title --- */
  .title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.35rem;
    letter-spacing: 0.12em;
    color: #ff2200;
    text-align: center;
    text-shadow: 0 0 18px rgba(255,50,0,0.7), 0 0 40px rgba(255,50,0,0.3);
    line-height: 1.2;
  }

  /* --- Logo circle --- */
  .logo-wrap {
    position: relative;
    width: 88px;
    height: 88px;
  }

  .logo-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #0057ff, #00cfff, #0057ff);
    animation: spin 3s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .logo-circle {
    position: relative;
    z-index: 1;
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0047cc 0%, #0099ff 50%, #00c8ff 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.4rem;
    box-shadow: 0 4px 30px rgba(0, 140, 255, 0.45), 0 0 0 3px rgba(0,0,0,0.6);
    animation: pulse-glow 2s ease-in-out infinite alternate;
  }

  @keyframes pulse-glow {
    from { box-shadow: 0 4px 24px rgba(0,140,255,0.4), 0 0 0 3px rgba(0,0,0,0.6); }
    to   { box-shadow: 0 4px 40px rgba(0,180,255,0.7), 0 0 0 3px rgba(0,0,0,0.6); }
  }

  /* --- Subtitle --- */
  .subtitle {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    color: #ff3300;
    text-align: center;
    text-shadow: 0 0 12px rgba(255,80,0,0.6);
  }

  /* --- Countdown --- */
  .timer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .timer-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  .timer {
    font-family: 'Orbitron', sans-serif;
    font-size: 3.2rem;
    font-weight: 900;
    color: #ff2200;
    letter-spacing: 0.05em;
    text-shadow: 0 0 20px rgba(255,30,0,0.8), 0 0 50px rgba(255,30,0,0.4);
    line-height: 1;
    animation: tick-flash 1s step-end infinite;
  }

  @keyframes tick-flash {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.75; }
  }

  /* --- Live badge --- */
  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: rgba(200,200,200,0.65);
    letter-spacing: 0.05em;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22dd55;
    box-shadow: 0 0 6px #22dd55;
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  /* --- Buttons --- */
  .btn-group {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 15px 20px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    letter-spacing: 0.1em;
    text-align: center;
    text-decoration: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }

  .btn:hover::after { background: rgba(255,255,255,0.07); }
  .btn:active { transform: scale(0.97) !important; }

  .btn-join {
    background: linear-gradient(135deg, #cc0000 0%, #ff3300 45%, #ff6600 100%);
    color: #fff;
    box-shadow: 0 4px 24px rgba(220,40,0,0.45), 0 1px 0 rgba(255,255,255,0.1) inset;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }

  .btn-join:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(220,60,0,0.6);
    filter: brightness(1.08);
  }

  .btn-vip {
    background: linear-gradient(135deg, #ffcc00 0%, #ffaa00 50%, #cc8800 100%);
    color: #0a0600;
    box-shadow: 0 4px 24px rgba(200,140,0,0.35), 0 1px 0 rgba(255,255,255,0.2) inset;
  }

  .btn-vip:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(220,160,0,0.5);
    filter: brightness(1.06);
  }

  /* --- Footer --- */
  .footer {
    font-size: 0.72rem;
    color: rgba(160,160,160,0.45);
    text-align: center;
    letter-spacing: 0.08em;
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,60,0,0.15), transparent);
  }
</style>
</head>
<body>

<div class="card">

  <div class="title">JAI CLUB OFFICIAL</div>

  <div class="logo-wrap">
    <div class="logo-ring"></div>
    <div class="logo-circle">🔥</div>
  </div>

  <div class="subtitle">DAILY FREE GIFTCODE</div>

  <div class="timer-wrap">
    <div class="timer-label">Next drop in</div>
    <div class="timer" id="timer">00:24</div>
  </div>

  <div class="live-badge">
    <div class="live-dot"></div>
    LIVE &nbsp;•&nbsp; 300 USERS IN VC
  </div>

  <div class="divider"></div>

  <div class="btn-group">
    <a class="btn btn-join" href="https://telegram.me/+uc7C0js8FF4zZDhl" target="_blank" rel="noopener">JOIN NOW</a>
    <a class="btn btn-vip"  href="https://telegram.me/+uc7C0js8FF4zZDhl" target="_blank" rel="noopener">VIP CHANNEL ACCESS</a>
  </div>

  <div class="footer">Official Channel &nbsp;•&nbsp; Secure Access</div>

</div>

<script>
  let seconds = 24;
  const el = document.getElementById('timer');

  function pad(n) { return n < 10 ? '0' + n : n; }

  setInterval(() => {
    seconds = seconds <= 0 ? 24 : seconds - 1;
    el.textContent = '00:' + pad(seconds);
  }, 1000);
</script>
</body>
</html>
